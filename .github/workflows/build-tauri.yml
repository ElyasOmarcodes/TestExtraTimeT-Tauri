name: Build Smart Timetable Tauri EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust (Tauri Backend)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Frontend Dependencies
        run: npm install

      # لومړی ستاسو د ویب پروژه بلډ کوو
      - name: Build React App (Frontend for Offline)
        run: npm run build

      - name: Initialize Tauri (With Default Icon)
        run: |
          npx @tauri-apps/cli@latest init --ci --app-name "smart-timetable" --window-title "هوښیار مهالویش" --frontend-dist "../dist" --dev-url "http://localhost:5173"
          
          # د اپلیکیشن د بنډل نوم بدلول
          (Get-Content src-tauri/tauri.conf.json) -replace 'com.tauri.dev', 'com.smartschool.timetable' | Set-Content src-tauri/tauri.conf.json

      - name: Build Tauri App (EXE & MSI)
        run: npx @tauri-apps/cli@latest build

      # د جوړ شوي اپلیکیشن اپلوډ کول
      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hoshyar-Mahalwesh-Offline-App
          # دا به هم exe او هم msi فایلونه پیدا او اپلوډ کړي
          path: src-tauri/target/release/bundle/**/*
          retention-days: 5
