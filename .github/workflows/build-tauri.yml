name: Build Smart Timetable Tauri EXE (Offline & No Icon)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust (Tauri Backend)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Frontend Dependencies
        run: npm install

      # لومړی ستاسو د ویب پروژه بلډ کوو ترڅو ټول فایلونه افلاین بڼې (dist) ته واړول شي
      - name: Build React App (Frontend for Offline)
        run: npm run build

      - name: Initialize Tauri & Remove Icons
        run: |
          # د Tauri v2 نوی او سم کمانډ د سرور لپاره (پرته له خالي کمانډونو او د --ci سره)
          npx @tauri-apps/cli@latest init --ci --app-name "smart-timetable" --window-title "هوښیار مهالویش" --frontend-dist "../dist" --dev-url "http://localhost:5173"
          
          # د اپلیکیشن د بنډل نوم بدلول ترڅو د بلډ ارور ورنکړي
          (Get-Content src-tauri/tauri.conf.json) -replace 'com.tauri.dev', 'com.smartschool.timetable' | Set-Content src-tauri/tauri.conf.json
          
          # د آیکون برخه په بشپړ ډول ړنګول
          $json = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          if ($null -ne $json.bundle) { $json.bundle.icon = @() }
          if ($null -ne $json.tauri -and $null -ne $json.tauri.bundle) { $json.tauri.bundle.icon = @() }
          $json | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      - name: Build Tauri App (Offline EXE)
        run: npx @tauri-apps/cli@latest build

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hoshyar-Mahalwesh-Offline-App
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 5
